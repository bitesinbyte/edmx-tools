name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore dependencies
        run: dotnet restore src/EdmxTools.csproj

      - name: Build
        run: dotnet build src/EdmxTools.csproj -c Release --no-restore

      - name: Publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish src/EdmxTools.csproj -c Release -o release --nologo

      - name: Prepare for GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sed -i 's/<base href="\/" \/>/<base href="https\:\/\/edmx.bitesinbyte.com\/" \/>/g' release/wwwroot/index.html
          cp release/wwwroot/index.html release/wwwroot/404.html
          touch release/wwwroot/.nojekyll

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
